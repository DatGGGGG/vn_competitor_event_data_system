x-vn-event-dw-base: &vn_event_dw_base
  build:
    context: ../..
    dockerfile: Dockerfile
  image: vn-event-dw-api:latest
  env_file:
    - ./pipeline.env
  environment:
    SENSOR_TOWER_RAW_DIR: /app/data_ingest/sensortower/raw
  volumes:
    - ${HOST_DATA_DIR}:/app/data
    - ${HOST_INGEST_DIR}:/app/data_ingest
    - ${HOST_SECRETS_DIR}:/app/secrets:ro

services:
  api:
    <<: *vn_event_dw_base
    restart: unless-stopped
    command:
      - vn-event-dw
      - serve-api
      - --db
      - /app/data/warehouse.db
      - --host
      - 0.0.0.0
      - --port
      - "8765"
    ports:
      - "127.0.0.1:${API_PORT:-8765}:8765"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8765/api/games", timeout=5).read()
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  job:
    <<: *vn_event_dw_base
    profiles:
      - ops
    command:
      - vn-event-dw
      - summary
      - --db
      - /app/data/warehouse.db

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - http
      - api:8765
      - --url=${NGROK_DOMAIN}
      - --log=stdout
    ports:
      - "127.0.0.1:${NGROK_INSPECT_PORT:-4040}:4040"
